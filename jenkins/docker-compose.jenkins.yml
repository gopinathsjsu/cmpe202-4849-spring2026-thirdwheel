services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: zestify-jenkins
    user: root
    privileged: true
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      # mount docker socket so Jenkins can run docker compose builds
      - /var/run/docker.sock:/var/run/docker.sock
      # repo mount (so the seeded job can find the workspace easily)
      - ../:/workspace:ro
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false

volumes:
  jenkins_home:
