services:
  postgres:
    image: postgres:16-alpine
    container_name: zestify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zestify
      POSTGRES_PASSWORD: zestify
      POSTGRES_DB: zestify
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zestify -d zestify"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: zestify-backend
    restart: unless-stopped
    environment:
      PORT: 5001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-zestify-secret-key-2026}
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: zestify
      PGPASSWORD: zestify
      PGDATABASE: zestify
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      EMAIL_PROVIDER: ethereal
      LOG_LEVEL: info
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5001/readyz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  seed:
    build:
      context: ./backend
    container_name: zestify-seed
    profiles: ["init"]
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: zestify
      PGPASSWORD: zestify
      PGDATABASE: zestify
    depends_on:
      postgres:
        condition: service_healthy
    command: ["node", "db/seed.js"]

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5001/api
    container_name: zestify-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:5001/api
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
